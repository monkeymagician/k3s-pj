apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-app
  template:
    metadata:
      labels:
        app: nginx-app
    spec:
      containers:
        - name: nginx
          image: 61.254.18.30:5000/pynginx:2
          ports:
            - containerPort: 80
          # 필요 시 환경변수 추가 가능
          env:
            - name: PY_BACKEND_HOST
              value: "py-code-run.default.svc.cluster.local"

---
apiVersion: v1
kind: Service
metadata:
  name: nginx-app
  namespace: default
spec:
  type: NodePort
  selector:
    app: nginx-app
  ports:
    - port: 80          # ClusterIP 내부 포트
      targetPort: 80    # 컨테이너 Port
      nodePort: 31515   # 학생들이 접속할 포트
