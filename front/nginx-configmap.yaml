apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-conf
  namespace: default
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # -----------------------------
        # Python backend proxy
        # -----------------------------
        location /run/python/ {
            # [선택] 일반적인 Kubernetes (Kubeadm, EKS 등) 기본 DNS 주소
            # resolver 10.96.0.10 valid=5s;
            
            # [현재 활성] k3s의 기본 DNS 주소
            resolver 10.43.0.10 valid=5s;

            # [핵심 수정] Knative 내부망 통신이므로 포트 번호(8080) 제거, 기본 HTTP(80) 사용
            set $backend_url http://py-code-run.default.svc.cluster.local/run;

            # 변수를 사용해서 호출 (Lazy Resolve 적용하여 Nginx 기동 시 DNS 에러 방지)
            proxy_pass $backend_url;
            
            proxy_http_version 1.1;
            
            # [핵심 유지] Host 헤더는 필수! (Istio가 이 헤더를 보고 라우팅 및 카나리 분배를 수행함)
            proxy_set_header Host py-code-run.default.svc.cluster.local;
            
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_connect_timeout 10s;
            proxy_read_timeout 120s;
        }
    }
