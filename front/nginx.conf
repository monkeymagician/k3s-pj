server {
    listen 80;
    server_name _;

    # 정적 리소스 위치
    root /usr/share/nginx/html;
    index index.html;

    # Health Check
    # location = /healthz {
    #     return 200 'ok';
    #     add_header Content-Type text/plain;
    # }

    # Static files + SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -----------------------------
    # Python backend proxy
    # =============================
    # 요청 경로: /run/python/
    # 실제 프록시: http://python-run-service/
    # -----------------------------
    location /run/python/ {
        proxy_pass http://py-code-run.default.172.16.101.151.nip.io/run;  # Kubernetes ClusterIP Service 이름
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout 120s;
    }

    # -----------------------------
    # Java backend proxy
    # =============================
    # 요청 경로: /run/java/
    # 실제 프록시: http://java-run-service/
    # -----------------------------
    location /run/java/ {
        proxy_pass http://py-code-run.default.172.16.101.151.nip.io/run;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout 120s;
    }
}